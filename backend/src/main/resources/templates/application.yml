server:
  port: 8080

spring:
  # 数据库配置 (适配 MySQL 8.0)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/flash_sale?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: 1234 # 替换为你的 MySQL 密码

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: your_redis_password # 如果没有密码留空或注释掉
      database: 0
      lettuce:
        pool:
          max-active: 100 # 连接池最大连接数（高并发场景适当调大）
          max-idle: 50
          min-idle: 10

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml # Mapper XML 文件位置
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰命名自动映射 (goods_name -> goodsName)
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开发阶段开启 SQL 日志打印